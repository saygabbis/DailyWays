# DailyWays — nginx (app 5174, collab 2529)
#
# 1) Crie /etc/nginx/conf.d/connection-upgrade.conf com o conteúdo de
#    deploy/nginx-connection-upgrade.conf (map $connection_upgrade).
# 2) Ajuste server_name e SSL abaixo.

upstream dailyways_app {
    server 127.0.0.1:5174;
}

upstream dailyways_collab {
    server 127.0.0.1:2529;
}

server {
    listen 443 ssl http2;
    server_name dailyways.saygabbis.cloud;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Socket.IO — NÃO usar Connection "upgrade" fixo (quebra polling → HTTP 400)
    location /socket.io/ {
        proxy_pass http://dailyways_collab;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /collab-health {
        proxy_pass http://dailyways_collab/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://dailyways_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
