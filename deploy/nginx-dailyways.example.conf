# Exemplo Nginx para DailyWays na VPS (HTTPS + collab WebSocket).
# Ajuste server_name, SSL e portas (app 5174, collab 2529).

upstream dailyways_app {
    server 127.0.0.1:5174;
}

upstream dailyways_collab {
    server 127.0.0.1:2529;
}

server {
    listen 443 ssl http2;
    server_name dailyways.saygabbis.cloud;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Socket.IO — OBRIGATÓRIO para tempo real e cursores
    location /socket.io/ {
        proxy_pass http://dailyways_collab;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health do collab-server (opcional)
    location = /collab-health {
        proxy_pass http://dailyways_collab/health;
        proxy_set_header Host $host;
    }

    # App (dev: Vite; produção: servir dist/ ou outro upstream)
    location / {
        proxy_pass http://dailyways_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
