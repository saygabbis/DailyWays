# Referência completa — dailyways.saygabbis.cloud
# 1) Crie /etc/nginx/conf.d/connection-upgrade.conf (deploy/nginx-connection-upgrade.conf)
# 2) Ajuste paths SSL e cole os dois server {} abaixo em sites-available/dailyways.saygabbis.cloud

server {
    server_name dailyways.saygabbis.cloud;

    location /socket.io/ {
        proxy_pass http://127.0.0.1:2529;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/dailyways.saygabbis.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailyways.saygabbis.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = dailyways.saygabbis.cloud) {
        return 301 https://$host$request_uri;
    }

    server_name dailyways.saygabbis.cloud;
    listen 80;
    return 404;
}
